version: "2"

services:
  bundle-factory:
    build:
      context: .
      dockerfile: target/Dockerfile
      args:
        HARNESS_UBUNTU_IMAGE: "${HARNESS_UBUNTU_IMAGE}"
        HARNESS_PUBLIC_INTERNET_FALLBACK_LABEL: "${HARNESS_PUBLIC_INTERNET_FALLBACK_LABEL}"
    container_name: "${HARNESS_PROJECT_NAME}-bundle-factory"
    hostname: bundle-factory
    init: true
    command: ["/usr/local/bin/harness-sleep.sh"]
    environment:
      HARNESS_ENVIRONMENT: bundle-factory
      HARNESS_MODE: "${HARNESS_MODE}"
      HARNESS_STATE_DIR: "/var/lib/loopforge"
      HARNESS_LOG_DIR: "/var/log/loopforge"
      SIMULATION_ONLY_PUBLIC_INTERNET_FALLBACK: "simulation-only"
    volumes:
      - "../../:/workspace:ro"
      - "./scripts/harness-sleep.sh:/usr/local/bin/harness-sleep.sh:ro"
    networks:
      - harness

  ldap:
    build:
      context: .
      dockerfile: ldap/Dockerfile
      args:
        HARNESS_LDAP_IMAGE: "${HARNESS_LDAP_IMAGE}"
    container_name: "${HARNESS_PROJECT_NAME}-ldap"
    hostname: ldap
    environment:
      LDAP_ORGANISATION: "Gerrit Jenkins Harness"
      LDAP_DOMAIN: "${HARNESS_LDAP_DOMAIN}"
      LDAP_BASE_DN: "${HARNESS_LDAP_BASE_DN}"
      LDAP_ADMIN_PASSWORD: "${HARNESS_LDAP_ADMIN_PASSWORD}"
      LDAP_CONFIG_PASSWORD: "${HARNESS_LDAP_CONFIG_PASSWORD}"
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: "${HARNESS_LDAP_BIND_USER}"
      LDAP_READONLY_USER_PASSWORD: "${HARNESS_LDAP_BIND_PASSWORD}"
    volumes:
      - "${HARNESS_LDAP_DATA_DIR}:/var/lib/ldap"
      - "${HARNESS_LDAP_CONFIG_DIR}:/etc/ldap/slapd.d"
    networks:
      - harness

  gerrit-target:
    build:
      context: .
      dockerfile: target/Dockerfile
      args:
        HARNESS_UBUNTU_IMAGE: "${HARNESS_UBUNTU_IMAGE}"
        HARNESS_PUBLIC_INTERNET_FALLBACK_LABEL: "${HARNESS_PUBLIC_INTERNET_FALLBACK_LABEL}"
    container_name: "${HARNESS_PROJECT_NAME}-gerrit-target"
    hostname: gerrit-target
    init: true
    command: ["/usr/local/bin/harness-sleep.sh"]
    environment:
      HARNESS_ENVIRONMENT: gerrit-target
      HARNESS_ROLE: gerrit
      HARNESS_MODE: "${HARNESS_MODE}"
      HARNESS_STATE_DIR: "/var/lib/loopforge"
      HARNESS_LOG_DIR: "/var/log/loopforge"
      SIMULATION_ONLY_PUBLIC_INTERNET_FALLBACK: "simulation-only"
    volumes:
      - "../../:/workspace:ro"
      - "${HARNESS_PRODUCT_HOME_DIR}/gerrit:/srv/gerrit"
      - "./scripts/harness-sleep.sh:/usr/local/bin/harness-sleep.sh:ro"
    ports:
      - "127.0.0.1:${HARNESS_GERRIT_HTTP_HOST_PORT}:8080"
      - "127.0.0.1:${HARNESS_GERRIT_TARGET_SSH_HOST_PORT}:22"
    networks:
      - harness

  jenkins-controller-target:
    build:
      context: .
      dockerfile: target/Dockerfile
      args:
        HARNESS_UBUNTU_IMAGE: "${HARNESS_UBUNTU_IMAGE}"
        HARNESS_PUBLIC_INTERNET_FALLBACK_LABEL: "${HARNESS_PUBLIC_INTERNET_FALLBACK_LABEL}"
    container_name: "${HARNESS_PROJECT_NAME}-jenkins-controller-target"
    hostname: jenkins-controller-target
    init: true
    command: ["/usr/local/bin/harness-sleep.sh"]
    environment:
      HARNESS_ENVIRONMENT: jenkins-controller-target
      HARNESS_ROLE: jenkins-controller
      HARNESS_MODE: "${HARNESS_MODE}"
      HARNESS_STATE_DIR: "/var/lib/loopforge"
      HARNESS_LOG_DIR: "/var/log/loopforge"
      SIMULATION_ONLY_PUBLIC_INTERNET_FALLBACK: "simulation-only"
    volumes:
      - "../../:/workspace:ro"
      - "${HARNESS_PRODUCT_HOME_DIR}/jenkins-controller:/var/lib/jenkins"
      - "${HARNESS_SHARED_JENKINS_STORAGE_DIR}:${HARNESS_JENKINS_SHARED_STORAGE_PATH}"
      - "./scripts/harness-sleep.sh:/usr/local/bin/harness-sleep.sh:ro"
    ports:
      - "127.0.0.1:${HARNESS_JENKINS_HTTP_HOST_PORT}:8080"
      - "127.0.0.1:${HARNESS_JENKINS_CONTROLLER_TARGET_SSH_HOST_PORT}:22"
    networks:
      - harness

  jenkins-agent-target:
    build:
      context: .
      dockerfile: target/Dockerfile
      args:
        HARNESS_UBUNTU_IMAGE: "${HARNESS_UBUNTU_IMAGE}"
        HARNESS_PUBLIC_INTERNET_FALLBACK_LABEL: "${HARNESS_PUBLIC_INTERNET_FALLBACK_LABEL}"
    container_name: "${HARNESS_PROJECT_NAME}-jenkins-agent-target"
    hostname: jenkins-agent-target
    init: true
    command: ["/usr/local/bin/harness-sleep.sh"]
    environment:
      HARNESS_ENVIRONMENT: jenkins-agent-target
      HARNESS_ROLE: jenkins-agent
      HARNESS_MODE: "${HARNESS_MODE}"
      HARNESS_STATE_DIR: "/var/lib/loopforge"
      HARNESS_LOG_DIR: "/var/log/loopforge"
      SIMULATION_ONLY_PUBLIC_INTERNET_FALLBACK: "simulation-only"
    volumes:
      - "../../:/workspace:ro"
      - "${HARNESS_PRODUCT_HOME_DIR}/jenkins-agent:/var/lib/jenkins-agent"
      - "${HARNESS_SHARED_JENKINS_STORAGE_DIR}:${HARNESS_JENKINS_SHARED_STORAGE_PATH}"
      - "./scripts/harness-sleep.sh:/usr/local/bin/harness-sleep.sh:ro"
    ports:
      - "127.0.0.1:${HARNESS_JENKINS_AGENT_TARGET_SSH_HOST_PORT}:22"
    networks:
      - harness

networks:
  harness:
