<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Docs Browser</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Gerrit/Jenkins setup</p>
          <h1>Docs Browser</h1>
        </div>
        <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle theme">
          <span aria-hidden="true">◐</span>
        </button>
      </header>

      <section class="toolbar" aria-label="Document tools">
        <label class="search">
          <span>Search</span>
          <input id="filterInput" type="search" placeholder="Filter docs" autocomplete="off">
        </label>
        <div class="stats" id="stats">Loading</div>
      </section>

      <section class="list" id="docList" aria-live="polite"></section>
      <p class="empty" id="emptyState" hidden>No matching Markdown files.</p>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
